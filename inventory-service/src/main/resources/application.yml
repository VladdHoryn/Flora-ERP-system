spring:
  application:
    name: inventory-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  config:
    import: "configserver:${CONFIG_SERVER_URL:http://config-server:8888},vault://"

  cloud:
    vault:
      uri: ${VAULT_URI:http://vault:8200}
      authentication: token
      token: ${VAULT_TOKEN:dev-root-token}

      kv:
        enabled: true
        backend: secret
        default-context: application
        application-name: inventory-service

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
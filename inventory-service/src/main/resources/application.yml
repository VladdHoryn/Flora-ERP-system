spring:
  application:
    name: inventory-service

  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_USERNAME:12345}
    url: ${DB_URL:jdbc:mariadb://localhost:3306/inventory_service_db}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8082}

production-service:
    base-url: ${PRODUCTION_BASE_URL:http://localhost:8081}
    production-path: ${PRODUCTION_BASE_URL:http://localhost:8081}

resilience4j:
  retry:
    instances:
      productionService:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
          - java.lang.Exception
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
    retry-aspect-order: 2
  circuitbreaker:
    instances:
      productionService:
        sliding-window-type: count_based
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
    circuit-breaker-aspect-order: 1

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} : %msg%n"
  level:
    org.springframework.jdbc.datasource: DEBUG
    org.hibernate.engine.jdbc.env.internal: DEBUG
    io.github.resilience4j.retry: DEBUG
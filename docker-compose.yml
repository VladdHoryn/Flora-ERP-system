services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"

  production-db:
    image: mariadb:11.2
    container_name: production-db
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: production_service_db
    volumes:
      - production-db-data:/var/lib/mysql
    ports:
      - "3307:3306"

  production-service:
    build:
      context: ./production-service
      dockerfile: Dockerfile
    restart: always
    container_name: production-service
    depends_on:
      - production-db
      - config-server
      - eureka-server
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: dev-root-token
      SPRING_PROFILES_ACTIVE: dev
    #      DB_URL: jdbc:mariadb://production-db:3306/production_service_db
    #      DB_USERNAME: root
    #      DB_PASSWORD: 12345
    #      INVENTORY_BASE_URL: http://inventory-service:8082
    ports:
      - "8081:8081"

  inventory-db:
    image: mariadb:11.2
    container_name: inventory-db
    environment:
      MARIADB_ROOT_PASSWORD: 12345
      MARIADB_DATABASE: inventory_service_db
    volumes:
      - inventory-db-data:/var/lib/mysql
    ports:
      - "3308:3306"

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    restart: always
    container_name: inventory-service
    depends_on:
      - inventory-db
      - config-server
      - eureka-server
    environment:
      DB_URL: jdbc:mariadb://inventory-db:3306/inventory_service_db
      DB_USERNAME: root
      DB_PASSWORD: 12345
      PRODUCTION_BASE_URL: http://production-service:8081
    ports:
      - "8082:8082"

  sales-db:
    image: mariadb:11.2
    container_name: sales-db
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: sales_service_db
    volumes:
      - sales-db-data:/var/lib/mysql
    ports:
      - "3309:3306"

  sales-service:
    build:
      context: ./sales-service
      dockerfile: Dockerfile
    container_name: sales-service
    environment:
      DB_URL: jdbc:mariadb://sales-db:3306/sales_service_db
      DB_USERNAME: root
      DB_PASSWORD: 12345
    depends_on:
      - sales-db
      - config-server
      - eureka-server
    ports:
      - "8083:8083"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: always
    container_name: api-gateway
    depends_on:
      - config-server
      - eureka-server
    ports:
      - "8085:8085"

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    restart: always
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    volumes:
      - ./configuration:/config

  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: http://vault:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.17
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    volumes:
      - ./infrastructure/vault:/vault/init:ro
    entrypoint: /bin/sh
    command: /vault/init/vault-init.sh
    restart: "no"

volumes:
  rabbitmq_data:
  production-db-data:
  inventory-db-data:
  sales-db-data:
  # vault_data:

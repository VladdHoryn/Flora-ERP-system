spring:
  application:
    name: production-service

  datasource:
    username: root
    password: 12345
    url: jdbc:mariadb://localhost:3306/production_service_db

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

inventory-service:
  base-url: http://localhost:8082
  inventory-path: /inventory/v1
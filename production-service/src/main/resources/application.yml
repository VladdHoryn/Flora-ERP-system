spring:
  application:
    name: production-service

  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345}
    url: ${DB_URL:jdbc:mariadb://localhost:3306/production_service_db}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: ${OPENAPI_PATH:/v3/api-docs}   # шлях до JSON документації OpenAPI
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}  # шлях до Swagger UI
    operationsSorter: alpha # сортування операцій в UI
    tagsSorter: alpha       # сортування тегів

server:
  port: ${SERVER_PORT:8081}

inventory-service:
  base-url: ${INVENTORY_BASE_URL:http://localhost:8082}
  inventory-path: ${INVENTORY_BASE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info

resilience4j:
  retry:
    instances:
      inventoryService:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  #    retry-aspect-order: 2
  circuitbreaker:
    instances:
      inventoryService:
        sliding-window-type: count_based
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
#    circuit-breaker-aspect-order: 1

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} : %msg%n"
  level:
    org.springframework.jdbc.datasource: DEBUG
    org.hibernate.engine.jdbc.env.internal: DEBUG
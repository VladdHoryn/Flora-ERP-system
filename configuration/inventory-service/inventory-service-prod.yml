server:
  port: ${SERVER_PORT:8082}

spring:
  rabbitmq:
    host: rabbitmq
    port: 5672
  #    username: ${RABBIT_USERNAME}
  #    password: ${RABBIT_PASSWORD}

  datasource:
    username: ${DB_USERNAME}
    #    password: ${DB_PASSWORD}
    url: ${DB_URL:jdbc:mariadb://inventory-db:3306/inventory_service_db}

  flyway:
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}

production-service:
  base-url: ${PRODUCTION_BASE_URL:http://production-service:8081}
  production-path: ${PRODUCTION_BASE_URL:http://production-service:8081}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
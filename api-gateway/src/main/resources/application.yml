server:
  port: 8085

spring:
  application:
    name: api-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888},optional:vault://"

  cloud:
    vault:
      uri: ${VAULT_URI:http://localhost:8200}
      authentication: token
      token: ${VAULT_TOKEN:dev-root-token}

